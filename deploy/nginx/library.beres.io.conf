# /etc/nginx/sites-available/library.beres.io
# Symlink: ln -s /etc/nginx/sites-available/library.beres.io /etc/nginx/sites-enabled/
#
# Before enabling SSL, run:
#   certbot --nginx -d library.beres.io

server {
    listen 80;
    listen [::]:80;
    server_name library.beres.io;

    # Certbot will insert the SSL redirect here after: certbot --nginx -d library.beres.io
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

