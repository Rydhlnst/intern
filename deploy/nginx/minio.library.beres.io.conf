# /etc/nginx/sites-available/minio.library.beres.io
# Symlink: ln -s /etc/nginx/sites-available/minio.library.beres.io /etc/nginx/sites-enabled/
#
# Exposes MinIO S3 API at minio.library.beres.io (public cover image access + S3 operations).
# MinIO console (port 9001) is NOT exposed publicly — access via SSH tunnel if needed:
#   ssh -L 9001:127.0.0.1:9001 user@your-vps
#
# Before enabling SSL, run:
#   certbot --nginx -d minio.library.beres.io

server {
    listen 80;
    listen [::]:80;
    server_name minio.library.beres.io;

    # Allow large uploads (book covers, etc.)
    client_max_body_size 50M;

    # Certbot will insert the SSL redirect here after: certbot --nginx -d minio.library.beres.io
    location / {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required for MinIO presigned URLs and virtual-host style
        proxy_set_header X-NginX-Proxy true;

        # Disable buffering for streaming uploads/downloads
        proxy_buffering off;
        proxy_request_buffering off;
    }
}

