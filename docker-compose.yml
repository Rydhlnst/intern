services:
  postgres:
    image: postgres:16-alpine
    container_name: library_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: library_user
      POSTGRES_PASSWORD: library_password
      POSTGRES_DB: library_db
    ports:
      - "5433:5432"
    volumes:
      - library_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U library_user -d library_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio
    container_name: library_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: library_minio
      MINIO_ROOT_PASSWORD: library_minio_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - library_minio_data:/data

  app:
    build:
      context: .
      target: runner
      args:
        # Baked into next.config at build time for next/image remotePatterns.
        # Set MINIO_PUBLIC_HOST to your VPS IP or domain in .env.
        MINIO_PUBLIC_HOST: ${MINIO_PUBLIC_HOST:-localhost}
        MINIO_PORT: ${MINIO_PORT:-9000}
        MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
    container_name: library_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      # MINIO_ENDPOINT uses the internal Docker service name for S3 API calls.
      MINIO_ENDPOINT: minio
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_ACCESS_KEY: library_minio
      MINIO_SECRET_KEY: library_minio_password
      MINIO_BUCKET: library-covers
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      # MINIO_PUBLIC_HOST is used at runtime when generating stored cover URLs.
      MINIO_PUBLIC_HOST: ${MINIO_PUBLIC_HOST:-localhost}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

  adminer:
    image: adminer
    container_name: library_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  library_postgres_data:
  library_minio_data:
