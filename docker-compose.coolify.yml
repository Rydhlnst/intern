# Coolify-optimized compose file.
#
# Only long-running services live here. Migrations, MinIO bucket creation,
# and DB seeding all run automatically at app startup via docker/entrypoint.sh
# — this is much more reliable in Coolify than one-shot init containers,
# which Coolify treats as failed when they exit cleanly.
#
# In Coolify:
#   Application type: Docker Compose
#   Compose file: docker-compose.coolify.yml
#   Set SERVICE_FQDN_APP=https://library.beres.io
#   Set MINIO domain (see README for the full env var list)

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-library_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-library_db}
    volumes:
      - library_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-library_user} -d ${POSTGRES_DB:-library_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - library_minio_data:/data
    expose:
      - "9000"

  app:
    build:
      context: .
      target: runner
      args:
        MINIO_PUBLIC_HOST: ${MINIO_PUBLIC_HOST}
        MINIO_PORT: ${MINIO_PORT:-443}
        MINIO_USE_SSL: ${MINIO_USE_SSL:-true}
    restart: unless-stopped
    environment:
      SERVICE_FQDN_APP: ${SERVICE_FQDN_APP:-3000}
      DATABASE_URL: ${DATABASE_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${SERVICE_FQDN_APP}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: library-covers
      MINIO_USE_SSL: "false"
      MINIO_PUBLIC_HOST: ${MINIO_PUBLIC_HOST}
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

volumes:
  library_postgres_data:
  library_minio_data:
